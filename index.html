<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS55 Kg Banggol Tebakang</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
height:100vh;
overflow:hidden;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.background{
position:fixed;
inset:0;
background:url("1001999844.png") center center;
background-size:cover;
filter:brightness(.9);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.25);
backdrop-filter:blur(2px);
}

.card{
position:relative;
z-index:10;
width:90%;
max-width:650px;
padding:40px;
text-align:center;
border:3px solid #40d9ff;
border-radius:22px;
background:rgba(0,0,0,.35);
box-shadow:
0 0 20px #00d9ff,
0 0 40px #ff00cc;
}

.address{
color:white;
font-size:2rem;
line-height:1.6;
font-weight:700;
text-shadow:
0 0 10px #00d9ff,
0 0 20px #ff00cc;
}

.map-btn{
margin-top:35px;
display:inline-flex;
justify-content:center;
align-items:center;
width:220px;
height:65px;
border-radius:60px;
text-decoration:none;
font-size:1.3rem;
font-weight:bold;
letter-spacing:3px;
color:white;
background:linear-gradient(90deg,#ff00cc,#00d9ff);
box-shadow:
0 0 15px #00d9ff,
0 0 30px #ff00cc;
transition:.3s;
}

.map-btn:hover{
transform:scale(1.08);
box-shadow:
0 0 25px #00d9ff,
0 0 50px #ff00cc;
}

@media(max-width:768px){

.address{
font-size:1.45rem;
}

.map-btn{
width:190px;
height:58px;
font-size:1.1rem;
}

}
</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="address">
PS55 Kg Banggol Tebakang,<br>
16450 Ketereh,<br>
Kota Bharu,<br>
Kelantan.
</div>

<a href="#" class="map-btn" id="mapButton">
MAP
</a>

</div>

<script>

const music=document.getElementById("bgmusic");

document.body.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

document.getElementById("mapButton").addEventListener("click",function(e){

e.preventDefault();

music.pause();
music.currentTime=0;

window.location.href="https://www.google.com/maps?q=5.9556414,102.2503758";

});

window.addEventListener("pagehide",()=>{
music.pause();
});

</script>

</body>
</html>
