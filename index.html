<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>PS/55 Kg Banggol Tebakang</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;

background:url("background.jpg") center center no-repeat;
background-size:cover;

}

body::before{

content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(2px);

}

.card{

position:relative;
z-index:2;

width:90%;
max-width:650px;

padding:40px;

text-align:center;

background:rgba(0,0,0,.30);

border:2px solid #00ffff;

border-radius:25px;

box-shadow:
0 0 20px cyan,
0 0 50px #ff00ff;

}

.address{

font-size:34px;
font-weight:bold;

line-height:1.5;

color:white;

text-shadow:

0 0 10px cyan,
0 0 20px #ff00ff;

}

.map-btn{

display:inline-block;

margin-top:40px;

padding:18px 70px;

border-radius:50px;

text-decoration:none;

font-size:24px;

font-weight:bold;

color:white;

background:linear-gradient(90deg,#ff00ff,#00ffff);

box-shadow:

0 0 20px cyan,
0 0 40px #ff00ff;

transition:.3s;

}

.map-btn:hover{

transform:scale(1.08);

}

@media(max-width:768px){

.address{

font-size:24px;

}

.map-btn{

font-size:20px;

padding:16px 55px;

}

}

</style>

</head>

<body>

<audio id="bgMusic" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="address">

PS/55 Kg Banggol Tebakang,<br>

16450 Ketereh,<br>

Kota Bharu,<br>

Kelantan.

</div>

<a href="#" id="mapButton" class="map-btn">
MAP
</a>

</div>

<script>
const music = document.getElementById("bgMusic");

// Cuba mainkan muzik apabila halaman dibuka
window.addEventListener("load", async () => {
    music.volume = 0.6;

    try {
        await music.play();
    } catch (e) {
        console.log("Autoplay disekat:", e);
    }
});

// Hentikan muzik sebelum buka Google Maps
document.getElementById("mapButton").addEventListener("click", async function(e){
    e.preventDefault();

    music.pause();
    music.currentTime = 0;

    window.location.href = "https://www.google.com/maps?q=5.9556414,102.2503758";
});
</script>
</body>

</html>
